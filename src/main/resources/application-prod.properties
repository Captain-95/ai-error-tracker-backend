spring.application.name=ai-error-tracker

server.port=${PORT:8080}

# DATABASE
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# REDIS
spring.data.redis.url=${REDIS_URL}
spring.data.redis.password=${REDIS_PASSWORD:}

# AI
app.ai.provider=groq
app.ai.enabled=true
app.ai.groq.api-key=${GROQ_API_KEY}
app.ai.groq.base-url=https://api.groq.com/openai/v1
app.ai.groq.model=llama3-70b-8192
app.ai.groq.max-tokens=2048
app.ai.groq.temperature=0.3

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-hours=8

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.errortracker=WARN
logging.level.root=ERROR