spring.application.name=ai-error-tracker
server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=error-tracker-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS}
app.kafka.topic.errors=error-events-uat
app.kafka.topic.partitions=3
app.kafka.topic.replicas=1

app.ai.provider=groq
app.ai.enabled=true
app.ai.groq.api-key=${GROQ_API_KEY}
app.ai.groq.base-url=https://api.groq.com/openai/v1
app.ai.groq.model=llama3-70b-8192
app.ai.groq.max-tokens=2048
app.ai.groq.temperature=0.3
app.ai.ollama.base-url=http://localhost:11434
app.ai.ollama.model=llama3

spring.data.redis.url=${REDIS_URL}
spring.data.redis.password=${REDIS_PASSWORD}

app.rate-limit.enabled=true
app.jwt.secret=${JWT_SECRET}
app.jwt.expiry-hours=24
app.cors.allowed-origins=https://uat-errortracker.vercel.app

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

logging.level.com.errortracker=INFO
logging.level.root=WARN

#################################
# MAIL
#################################

mail.switch=true

spring.mail.host=smtp.gmail.com

spring.mail.port=587

spring.mail.username=admin@errortracker.com

spring.mail.password=YOUR_PASSWORD

spring.mail.properties.mail.smtp.auth=true

spring.mail.properties.mail.smtp.starttls.enable=true